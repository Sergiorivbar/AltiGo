version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: altigo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: altigo
      POSTGRES_PASSWORD: altigo
      POSTGRES_DB: altigo_db
    ports:
      - "5432:5432"
    volumes:
      - altigo_pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: altigo_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@altigo.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  altigo_pg_data:
